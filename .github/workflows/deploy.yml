name: Network Automation

on: [push]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install Ansible
      run: |
        python3 -m pip install --upgrade pip
        pip install ansible

    - name: Run Playbook
      run: |
        ansible-playbook -i inventory.ini playbook.yml